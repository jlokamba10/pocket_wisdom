apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: pocketwisdom
      defaultBucket: tenant_demo_raw
    secureJsonData:
      token: pocketwisdom-token
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
